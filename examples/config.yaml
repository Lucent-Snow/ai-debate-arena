default:
  provider: openai
  model: ${AI_DEBATE_MODEL}
  base_url: ${AI_DEBATE_BASE_URL}
  api_key: ${AI_DEBATE_API_KEY}
  temperature: 0.4
  max_tokens: 800
  timeout_seconds: 120
  retry_count: 2

overrides:
  judge:
    temperature: 0
    max_tokens: 600
  summarizer:
    temperature: 0.2
    max_tokens: 900
